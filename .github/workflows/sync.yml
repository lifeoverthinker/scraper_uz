name: Scraper Sync
on:
  schedule:
    - cron: '40 5,9,13,16,21 * * *' # 25 min po generowaniu plików (15+25=40)
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Wybierz tryb działania scrapera'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - sync
          - catalog_only

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with: {python-version: '3.11'}
      - name: Install dependencies
        run: pip install -r scraper/requirements.txt
      - name: Run Scraper
        run: python -m scraper.main
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Przekazujemy tryb wybrany ręcznie LUB 'full' jeśli odpala automat
          MODE: ${{ github.event.inputs.run_mode || 'full' }}
          SCRAPER_MODE: ${{ github.event.inputs.run_mode || 'full' }}