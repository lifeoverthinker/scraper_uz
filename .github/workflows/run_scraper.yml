name: Run Scraper (catalog only)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Tryb: catalog_only | xml_bootstrap | xml_sync"
        required: false
        default: "catalog_only"

  schedule:
    - cron: "20 2 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Verify env
        run: |
          test -n "${SUPABASE_URL}" || (echo 'Brak SUPABASE_URL' && exit 1)
          test -n "${SUPABASE_SERVICE_ROLE_KEY}" || (echo 'Brak SUPABASE_SERVICE_ROLE_KEY' && exit 1)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPER_ONLY: ${{ github.event.inputs.mode || 'catalog_only' }}
        run: |
          python -m scraper.main 2>&1 | tee scraper_run.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: scraper_run.log
          retention-days: 7