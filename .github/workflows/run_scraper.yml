name: Run Scraper

on:
  schedule:
    # Co 4h: odswiezaj zajecia grup i nauczycieli (w tle)
    - cron: "20 */4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Tryb uruchomienia"
        required: true
        default: "events_all"
        type: choice
        options:
          - events_all
          - full
          - kierunki
          - grupy
          - grupy_zajecia
          - teachers
      xml_first:
        description: "Preferuj XML dla katalogu"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      events_xml_first:
        description: "Preferuj XML dla eventow"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      verbose:
        description: "Dodatkowe logi"
        required: false
        default: "false"
      dry_run:
        description: "Placeholder (brak zapisu)"
        required: false
        default: "false"
      scraper_external_ids:
        description: "Opcjonalnie: lista external ID nauczycieli, np. 34660,30172"
        required: false
        default: ""
      teachers_batch_size:
        description: "Opcjonalnie: batch dla zajec nauczycieli"
        required: false
        default: ""

jobs:
  scrape:
    name: Uruchom scraper
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: scraper-manual
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ustaw Pythona
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Instalacja zaleznosci
        run: |
          pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Weryfikacja zmiennych srodowiskowych
        run: |
          test -n "${SUPABASE_URL}" || (echo 'Brak SUPABASE_URL' && exit 1)
          test -n "${SUPABASE_SERVICE_ROLE_KEY}" || (echo 'Brak SUPABASE_SERVICE_ROLE_KEY' && exit 1)
          echo "OK: secrets obecne"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Uruchom scraper
        id: run_scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERBOSE: ${{ github.event.inputs.verbose }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          REQ_MODE: ${{ github.event.inputs.mode || 'events_all' }}
          RAW_EXTERNAL_IDS: ${{ github.event.inputs.scraper_external_ids }}
          RAW_TEACHERS_BATCH: ${{ github.event.inputs.teachers_batch_size }}
          XML_FIRST: ${{ github.event.inputs.xml_first || 'true' }}
          EVENTS_XML_FIRST: ${{ github.event.inputs.events_xml_first || 'true' }}
        run: |
          set -e
          echo "== Start ==" | tee scraper_run.log
          echo "Wybrany tryb: ${REQ_MODE}" | tee -a scraper_run.log

          export SCRAPER_XML_FIRST=$([ "${XML_FIRST}" = "true" ] && echo "1" || echo "0")
          export SCRAPER_EVENTS_XML_FIRST=$([ "${EVENTS_XML_FIRST}" = "true" ] && echo "1" || echo "0")
          echo "SCRAPER_XML_FIRST=${SCRAPER_XML_FIRST}" | tee -a scraper_run.log
          echo "SCRAPER_EVENTS_XML_FIRST=${SCRAPER_EVENTS_XML_FIRST}" | tee -a scraper_run.log

          if [ "${REQ_MODE}" = "events_all" ]; then
            MODES=("grupy_zajecia" "teachers")
          elif [ "${REQ_MODE}" = "full" ] || [ -z "${REQ_MODE}" ]; then
            MODES=("full")
          else
            MODES=("${REQ_MODE}")
          fi

          if [ -n "${RAW_EXTERNAL_IDS}" ]; then
            export SCRAPER_EXTERNAL_IDS="${RAW_EXTERNAL_IDS}"
            echo "SCRAPER_EXTERNAL_IDS=${SCRAPER_EXTERNAL_IDS}" >> scraper_run.log
          fi

          if [ -n "${RAW_TEACHERS_BATCH}" ]; then
            export TEACHERS_BATCH_SIZE="${RAW_TEACHERS_BATCH}"
            echo "TEACHERS_BATCH_SIZE=${TEACHERS_BATCH_SIZE}" >> scraper_run.log
          fi

          if [ "${VERBOSE}" = "true" ]; then
            echo "Tryb verbose aktywny." | tee -a scraper_run.log
          fi

          for MODE in "${MODES[@]}"; do
            echo "--- START MODE: ${MODE} ---" | tee -a scraper_run.log
            if [ "${MODE}" = "full" ]; then
              unset SCRAPER_ONLY
              echo "Pelny pipeline (brak SCRAPER_ONLY)" | tee -a scraper_run.log
            else
              export SCRAPER_ONLY="${MODE}"
              echo "SCRAPER_ONLY=${SCRAPER_ONLY}" | tee -a scraper_run.log
            fi
            python -m scraper.main 2>&1 | tee -a scraper_run.log
            echo "--- END MODE: ${MODE} ---" | tee -a scraper_run.log
          done

          echo "== Koniec ==" | tee -a scraper_run.log

      - name: Artefakt logow
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-logs
          path: scraper_run.log
          retention-days: 7

      - name: Podsumowanie
        if: always()
        run: |
          echo "Run zakonczony statusem: ${{ job.status }}"
